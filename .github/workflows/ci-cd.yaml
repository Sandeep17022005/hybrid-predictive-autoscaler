name: Hybrid Predictive AutoScaler CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Lint & Test all services
  # ─────────────────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: app
            name: app-service
          - service: ml-service
            name: ml-service
          - service: controller
            name: scaling-controller
          - service: traffic-generator
            name: traffic-generator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          cd ${{ matrix.service }}
          flake8 . --max-line-length=120 --exclude=__pycache__,.venv

      - name: Run tests (if present)
        run: |
          cd ${{ matrix.service }}
          if find . -name "test_*.py" | grep -q .; then
            pytest -v --tb=short
          else
            echo "No tests found in ${{ matrix.service }}, skipping"
          fi

  # ─────────────────────────────────────────────
  # Build & Push Docker Images
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - context: app
            image: app-service
          - context: ml-service
            image: ml-service
          - context: controller
            image: scaling-controller
          - context: traffic-generator
            image: traffic-generator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Helm Lint
  # ─────────────────────────────────────────────
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Lint Helm chart
        run: helm lint helm/hybrid-autoscaler/
