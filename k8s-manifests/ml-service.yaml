apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-prediction-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-prediction-service
  template:
    metadata:
      labels:
        app: ml-prediction-service
    spec:
      containers:
        - name: ml-service
          image: ml-service:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-service.default.svc.cluster.local:9090"
            - name: PROMETHEUS_RETRIES
              value: "3"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 20
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ml-prediction-service
  namespace: default
spec:
  selector:
    app: ml-prediction-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
