global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: app-service
    static_configs:
      - targets: ["app-service:8000"]
    metrics_path: /metrics

  - job_name: ml-service
    static_configs:
      - targets: ["ml-service:8001"]
    metrics_path: /metrics

  - job_name: scaling-controller
    static_configs:
      - targets: ["scaling-controller:8002"]
    metrics_path: /metrics
